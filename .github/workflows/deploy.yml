name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'web/**'
      - 'docs/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancel in-progress runs of the same group.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            web/package-lock.json
            docs/package-lock.json

      # Landing page (Vite) -> web/dist  (relative base, host-agnostic)
      - name: Build landing
        working-directory: web
        run: |
          npm ci
          npm run build

      # Documentation (Nextra static export) -> docs/out
      # basePath is absolute: it must match the path the docs are served at.
      - name: Build docs
        working-directory: docs
        env:
          BASE_PATH: /eujeno/docs
        run: |
          npm ci
          npm run build

      # Combine: mount the docs export under /docs of the landing output.
      - name: Combine outputs
        run: cp -r docs/out web/dist/docs

      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
