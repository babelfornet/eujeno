<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Axyn · rete di inferenza LLM decentralizzata</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html,body{margin:0;height:100%;background:#070a10;}
  *{box-sizing:border-box;}
  ::selection{background:#2dd4bf33;}
  @keyframes synpulse{0%,100%{opacity:.45;transform:scale(1)}50%{opacity:1;transform:scale(1.35)}}
  @keyframes synfade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
  @keyframes syndot{0%,80%,100%{opacity:.25;transform:translateY(0)}40%{opacity:1;transform:translateY(-3px)}}
  @keyframes synspin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .syn-card{animation:synfade .35s ease both;}
  input::placeholder,textarea::placeholder{color:#42536b;}
  ::-webkit-scrollbar{width:10px;height:10px;}
  ::-webkit-scrollbar-thumb{background:#1c2a3e;border-radius:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  #root{height:100%;}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback } = React;
const h = React.createElement;

const TEAL = '#2dd4bf', AMBER = '#f59e0b', RED = '#f87171';
const PALETTE = ['#2dd4bf','#38bdf8','#a78bfa','#f472b6','#fb923c','#facc15','#4ade80','#22d3ee','#818cf8','#fda4af','#c084fc','#fbbf24'];

/* ---------- pure helpers (mirror backend build_chain) ---------- */
function parseRanges(decoders){
  const out = [];
  (decoders || []).forEach(d => {
    const m = String(d).split('-');
    const a = parseInt(m[0], 10), b = parseInt(m[1], 10);
    if (!isNaN(a) && !isNaN(b) && b > a) out.push([a, b]);
  });
  return out;
}

function fmtMem(mb){
  if (typeof mb !== 'number') return '—';
  return mb >= 1024 ? (mb / 1024).toFixed(2) + ' GiB' : mb + ' MB';
}

function cidOf(n, i){ return n.conn || ('n' + i); }

// Build the whole derived model state from a registry object.
function buildChain(reg){
  reg = reg || {};
  const N = typeof reg.num_layers === 'number' ? reg.num_layers : 0;
  const nodes = Array.isArray(reg.nodes) ? reg.nodes : [];
  const model = reg.model || 'modello sconosciuto';

  const colorOf = {};
  nodes.forEach((n, i) => { colorOf[cidOf(n, i)] = PALETTE[i % PALETTE.length]; });

  // greedy tiling of [0, N)
  const owner = new Array(N).fill(null);
  nodes.forEach((n, i) => {
    parseRanges(n.stages && n.stages.decoders).forEach(([a, b]) => {
      for (let L = a; L < b && L < N; L++) if (owner[L] == null) owner[L] = cidOf(n, i);
    });
  });
  const coveredLayers = owner.filter(o => o != null).length;
  const coveragePct = N ? Math.round(coveredLayers / N * 100) : 0;

  // contiguous segments (owned or gap)
  const rawSegs = [];
  let i = 0;
  while (i < N){
    const o = owner[i]; let j = i + 1;
    while (j < N && owner[j] === o) j++;
    rawSegs.push({ start: i, end: j, owner: o });
    i = j;
  }
  const gaps = rawSegs.filter(s => s.owner == null).map(s => ({ range: s.start + '-' + s.end }));

  const hasEmbed = nodes.some(n => n.stages && n.stages.embed);
  const hasHead = nodes.some(n => n.stages && n.stages.head);
  const tiled = N > 0 && gaps.length === 0;
  const operational = hasEmbed && hasHead && tiled;
  const statusColor = operational ? TEAL : AMBER;

  // human-readable missing list
  const missing = [];
  if (!hasEmbed) missing.push('embed');
  gaps.forEach(g => missing.push('layer ' + g.range));
  if (!hasHead) missing.push('head');

  // machine stage pieces for the serve command
  const stagePieces = [];
  if (!hasEmbed) stagePieces.push('embed');
  gaps.forEach(g => stagePieces.push('decoder:' + g.range));
  if (!hasHead) stagePieces.push('head');

  const totalMb = nodes.reduce((a, n) => a + (typeof n.mem_mb === 'number' ? n.mem_mb : 0), 0);

  const statusOf = st => st === 'offline' ? RED : (st === 'degraded' ? AMBER : TEAL);

  // per-node view models
  const vmNodes = nodes.map((n, ix) => {
    const cid = cidOf(n, ix);
    const c = colorOf[cid];
    const st = n.status || 'online';
    const parts = [];
    if (n.stages && n.stages.embed) parts.push('embed');
    parseRanges(n.stages && n.stages.decoders).forEach(([a, b]) => parts.push(a + '-' + b));
    if (n.stages && n.stages.head) parts.push('head');
    return {
      key: cid, cid, color: c, label: n.label || cid, conn: n.conn || '—',
      status: st, statusColor: statusOf(st), online: st === 'online',
      mem: fmtMem(n.mem_mb), stagesText: parts.join(' · '),
      embed: !!(n.stages && n.stages.embed), head: !!(n.stages && n.stages.head),
      decoders: parseRanges(n.stages && n.stages.decoders),
    };
  });

  return {
    model, numLayers: N, nodes: vmNodes, colorOf, rawSegs, gaps,
    hasEmbed, hasHead, tiled, operational, statusColor,
    coveredLayers, coveragePct, missing, stagePieces,
    totalMb, totalMem: fmtMem(totalMb), totalNodes: nodes.length,
    embedNode: vmNodes.find(n => n.embed) || null,
    headNode: vmNodes.find(n => n.head) || null,
  };
}

function wsFromHttp(url){
  return (url || '').replace(/^http/i, 'ws').replace(/\/$/, '');
}

// pick the first missing piece for the suggested serve command
function serveCommand(coordinatorUrl, m){
  const wsBase = wsFromHttp(coordinatorUrl);
  let piece = m.stagePieces[0];
  if (!piece) piece = m.numLayers ? ('decoder:0-' + m.numLayers) : 'decoder:0-N';
  return 'axyn serve --coordinator ' + wsBase + '/node --stages "' + piece + '"';
}

/* ---------- small presentational atoms ---------- */
function StatusBadge({ operational }){
  const c = operational ? TEAL : AMBER;
  return h('div', { style: {
    display: 'inline-flex', alignItems: 'center', gap: '9px', fontSize: '13px',
    fontWeight: 700, letterSpacing: '.6px', padding: '8px 15px', borderRadius: '10px',
    background: operational ? 'rgba(45,212,191,.10)' : 'rgba(245,158,11,.10)',
    border: '1px solid ' + c + '55', color: c,
  }},
    h('span', { style: { width: '9px', height: '9px', borderRadius: '50%', background: c, boxShadow: '0 0 10px ' + c, animation: 'synpulse 2s infinite' }}),
    h('span', null, operational ? 'OPERATIVO' : 'NON OPERATIVO'),
  );
}

function CopyBox({ text, label, big, style }){
  const [copied, setCopied] = useState(false);
  const onCopy = () => {
    try { navigator.clipboard && navigator.clipboard.writeText(text); } catch(e){}
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return h('div', { onClick: onCopy, style: Object.assign({
    cursor: 'pointer', fontFamily: "'IBM Plex Mono',monospace", fontSize: '11.5px',
    color: '#dbe6f3', background: '#070d16', border: '1px solid #2a3a1a', borderRadius: '9px',
    padding: '11px 13px', display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '12px',
  }, style || {}) },
    h('span', { style: { whiteSpace: 'pre-wrap', wordBreak: 'break-all', lineHeight: 1.5 }}, text),
    h('span', { style: {
      flex: 'none', fontSize: '10px', letterSpacing: '.5px', color: '#f3c46b',
      border: '1px solid #3d300f', padding: '3px 8px', borderRadius: '6px',
    }}, copied ? (big ? 'COPIATO' : 'copiato') : (big ? 'COPIA' : 'copia')),
  );
}

function CopyChip({ text, prefix }){
  const [copied, setCopied] = useState(false);
  const onCopy = () => {
    try { navigator.clipboard && navigator.clipboard.writeText(text); } catch(e){}
    setCopied(true);
    setTimeout(() => setCopied(false), 1500);
  };
  return h('div', { onClick: onCopy, style: {
    cursor: 'pointer', fontFamily: "'IBM Plex Mono',monospace", fontSize: '10.5px',
    color: '#9fb0c6', background: '#0b1320', border: '1px solid #1c2a3e', borderRadius: '7px', padding: '4px 9px',
  }}, prefix + ' · ' + (copied ? 'copiato' : 'copia'));
}

/* ---------- assembly strip ---------- */
function AssemblyStrip({ m }){
  const N = m.numLayers;
  const pillBase = {
    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    flex: 'none', width: '66px', height: '40px', borderRadius: '9px', fontSize: '9px',
    fontWeight: 600, letterSpacing: '1px', transition: 'all .4s ease',
  };
  const coveredPill = c => Object.assign({}, pillBase, { background: c + '22', border: '1px solid ' + c + '66', color: c });
  const missPill = Object.assign({}, pillBase, {
    background: 'repeating-linear-gradient(45deg,#3a1320,#3a1320 6px,#2a0d18 6px,#2a0d18 12px)',
    border: '1px dashed ' + RED + '88', color: '#fca5a5',
  });
  const embedColor = m.embedNode ? m.embedNode.color : null;
  const headColor = m.headNode ? m.headNode.color : null;

  const segments = m.rawSegs.map(s => {
    const range = s.start + '-' + s.end;
    if (s.owner != null){
      const c = m.colorOf[s.owner];
      const node = m.nodes.find(n => n.cid === s.owner);
      return h('div', { key: range, title: 'layer ' + range + ' · ' + ((node && node.label) || s.owner), style: {
        flexGrow: s.end - s.start, flexBasis: 0, minWidth: 0,
        background: 'linear-gradient(180deg,' + c + '40,' + c + '18)',
        borderTop: '2px solid ' + c, borderRight: '1px solid #0a121d',
        transition: 'flex-grow .5s ease, background .4s ease',
      }});
    }
    return h('div', { key: range, title: 'layer ' + range + ' · scoperto', style: {
      flexGrow: s.end - s.start, flexBasis: 0, minWidth: 0,
      background: 'repeating-linear-gradient(45deg,#3a1320,#3a1320 6px,#2a0d18 6px,#2a0d18 12px)',
      borderTop: '2px dashed ' + RED + '99', borderRight: '1px solid #0a121d',
      transition: 'flex-grow .5s ease',
    }});
  });

  // ruler marks
  const step = N >= 8 && N % 8 === 0 ? 8 : (N % 4 === 0 ? 4 : Math.max(1, Math.round(N / 3)));
  const markVals = [];
  for (let v = 0; v <= N; v += step) markVals.push(v);
  if (N > 0 && markVals[markVals.length - 1] !== N) markVals.push(N);
  const marks = markVals.map(v => h('div', { key: v, style: {
    position: 'absolute', top: 0, transform: 'translateX(-50%)',
    display: 'flex', flexDirection: 'column', alignItems: 'center', left: (N ? v / N * 100 : 0) + '%',
  }},
    h('div', { style: { width: '1px', height: '4px', background: '#2a3a52', marginBottom: '2px' }}),
    h('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '9.5px', color: '#566679' }}, v),
  ));

  return h('section', { className: 'syn-card', style: {
    background: '#0c1421', border: '1px solid #1b2a3f', borderRadius: '14px',
    padding: '14px 18px 12px', marginBottom: '14px',
  }},
    h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'baseline', gap: '12px', flexWrap: 'wrap', marginBottom: '11px' }},
      h('span', { style: { fontSize: '12px', fontWeight: 600, color: '#9fb0c6', letterSpacing: '.3px' }}, 'Assemblaggio del modello'),
      h('span', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', color: m.statusColor, whiteSpace: 'nowrap' }}, m.coveredLayers + '/' + N + ' layer · ' + m.coveragePct + '%'),
    ),
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '9px' }},
      h('div', { style: m.hasEmbed ? coveredPill(embedColor) : missPill },
        h('span', { style: { opacity: .85 }}, 'EMBED'),
        h('span', { style: { fontSize: '8.5px', marginTop: '2px', opacity: .9 }}, m.hasEmbed ? '✓' : 'mancante'),
      ),
      h('span', { style: { color: '#2f435d', fontSize: '14px' }}, '→'),
      h('div', { style: { flex: 1, minWidth: 0 }},
        h('div', { style: { display: 'flex', height: '40px', borderRadius: '9px', overflow: 'hidden', border: '1px solid #182539', position: 'relative' }},
          segments.length ? segments : h('div', { style: { flex: 1, background: '#0a121d' }}),
        ),
        h('div', { style: { position: 'relative', height: '15px', marginTop: '5px' }}, marks),
      ),
      h('span', { style: { color: '#2f435d', fontSize: '14px' }}, '→'),
      h('div', { style: m.hasHead ? coveredPill(headColor) : missPill },
        h('span', { style: { opacity: .85 }}, 'HEAD'),
        h('span', { style: { fontSize: '8.5px', marginTop: '2px', opacity: .9 }}, m.hasHead ? '✓' : 'mancante'),
      ),
    ),
  );
}

/* ---------- missing alert ---------- */
function MissingAlert({ m, command }){
  return h('section', { className: 'syn-card', style: {
    background: '#1a1305', border: '1px solid #3d300f', borderRadius: '14px',
    padding: '14px 18px', marginBottom: '14px', display: 'flex', gap: '16px',
    alignItems: 'flex-start', flexWrap: 'wrap',
  }},
    h('div', { style: { flex: 1, minWidth: '240px' }},
      h('div', { style: { fontSize: '11px', letterSpacing: '.4px', color: '#f3c46b', fontWeight: 600, marginBottom: '9px' }}, '⚠ MANCANO ALLA RETE'),
      h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '7px' }},
        m.missing.map((ms, i) => h('span', { key: i, style: {
          fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', color: '#f3c46b',
          background: '#231a09', border: '1px solid #3d300f', padding: '4px 10px', borderRadius: '7px',
        }}, ms)),
      ),
    ),
    h('div', { style: { flex: 2, minWidth: '300px' }},
      h('div', { style: { fontSize: '10.5px', color: '#8a7a4d', marginBottom: '6px' }}, 'avvia il pezzo mancante:'),
      h(CopyBox, { text: command }),
    ),
  );
}

/* ---------- 2D network graph (SVG) ---------- */
function NetworkGraph({ m, coordinatorUrl }){
  if (m.totalNodes === 0){
    return h('div', { style: {
      position: 'relative', width: '100%', height: '430px', marginTop: '14px',
      borderRadius: '12px', overflow: 'hidden',
      background: 'radial-gradient(circle at 50% 42%, #0c1d30 0%, #070d16 72%)',
      border: '1px solid #122031', display: 'flex', alignItems: 'center', justifyContent: 'center',
      color: '#647689', fontSize: '13.5px',
    }}, 'in attesa che i nodi si uniscano alla rete…');
  }

  const W = 900, H = 430, cx = W / 2, cy = H / 2;
  const n = m.nodes.length;
  const R = Math.min(W, H) * 0.36;
  const showLabels = n <= 14;

  const pts = m.nodes.map((nd, i) => {
    const ang = -Math.PI / 2 + (i / n) * Math.PI * 2;
    return { nd, x: cx + Math.cos(ang) * R, y: cy + Math.sin(ang) * R, ang };
  });

  return h('div', { style: {
    position: 'relative', width: '100%', height: '430px', marginTop: '14px',
    borderRadius: '12px', overflow: 'hidden',
    background: 'radial-gradient(circle at 50% 42%, #0c1d30 0%, #070d16 72%)',
    border: '1px solid #122031',
  }},
    h('svg', { viewBox: '0 0 ' + W + ' ' + H, preserveAspectRatio: 'xMidYMid meet', style: { width: '100%', height: '100%', display: 'block' }},
      // links to center
      pts.map((p, i) => h('line', {
        key: 'l' + i, x1: cx, y1: cy, x2: p.x, y2: p.y,
        stroke: p.nd.color, strokeWidth: 1.4, opacity: p.nd.online ? 0.42 : 0.14,
      })),
      // center coordinator glow + node
      h('circle', { cx, cy, r: 30, fill: TEAL, opacity: 0.10 }),
      h('circle', { cx, cy, r: 17, fill: '#0a1626', stroke: TEAL, strokeWidth: 2 }),
      h('circle', { cx, cy, r: 6, fill: TEAL, style: { animation: 'synpulse 2.4s infinite' }}),
      h('text', { x: cx, y: cy + 34, fill: '#7f93ab', fontSize: 11, textAnchor: 'middle', fontFamily: "'IBM Plex Mono',monospace" }, 'coordinator'),
      // worker nodes
      pts.map((p, i) => h('g', { key: 'n' + i },
        h('circle', { cx: p.x, cy: p.y, r: 16, fill: p.nd.color, opacity: 0.16 }),
        h('circle', { cx: p.x, cy: p.y, r: 9, fill: p.nd.online ? p.nd.color : '#16202e', stroke: p.nd.color, strokeWidth: 2, opacity: p.nd.online ? 1 : 0.55 }),
        h('circle', { cx: p.x + 8, cy: p.y - 8, r: 3.2, fill: p.nd.statusColor, stroke: '#070d16', strokeWidth: 1 }),
        showLabels ? h('text', {
          x: p.x, y: p.y - 20, fill: '#aebccd', fontSize: 11, textAnchor: 'middle',
          fontFamily: "'IBM Plex Sans',sans-serif", fontWeight: 600,
        }, p.nd.label) : null,
        showLabels && p.nd.stagesText ? h('text', {
          x: p.x, y: p.y + 28, fill: '#647689', fontSize: 9.5, textAnchor: 'middle',
          fontFamily: "'IBM Plex Mono',monospace",
        }, p.nd.stagesText) : null,
      )),
    ),
  );
}

/* ---------- node cards ---------- */
function NodeCards({ m }){
  const chipBase = { fontFamily: "'IBM Plex Mono',monospace", fontSize: '10.5px', padding: '4px 9px', borderRadius: '6px' };
  return h('section', { className: 'syn-card', style: {
    background: '#0c1421', border: '1px solid #1b2a3f', borderRadius: '16px', padding: '18px 20px',
  }},
    h('div', { style: { fontSize: '13px', fontWeight: 600, color: '#9fb0c6', letterSpacing: '.3px', marginBottom: '14px' }}, 'Dettaglio nodi'),
    m.totalNodes === 0
      ? h('div', { style: { padding: '26px', textAlign: 'center', border: '1px dashed #233246', borderRadius: '12px', color: '#647689', fontSize: '13px' }}, 'nessun nodo connesso')
      : h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(248px,1fr))', gap: '13px' }},
          m.nodes.map(nd => {
            const chips = [];
            if (nd.embed) chips.push(h('span', { key: 'e', style: Object.assign({}, chipBase, { background: 'rgba(56,189,248,.10)', color: '#7dd3fc', border: '1px solid #1c4257' }) }, 'embed'));
            nd.decoders.forEach(([a, b], di) => chips.push(h('span', { key: 'd' + di, style: Object.assign({}, chipBase, { background: nd.color + '14', color: nd.color, border: '1px solid ' + nd.color + '40' }) }, 'decoder ' + a + '-' + b)));
            if (nd.head) chips.push(h('span', { key: 'hd', style: Object.assign({}, chipBase, { background: 'rgba(167,139,250,.12)', color: '#c4b5fd', border: '1px solid #3a2a5a' }) }, 'head'));
            return h('div', { key: nd.key, className: 'syn-card', style: {
              background: '#0a121d', border: '1px solid #182539', borderRadius: '13px',
              padding: '15px 16px', transition: 'all .4s ease', borderLeft: '3px solid ' + nd.color,
            }},
              h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '10px' }},
                h('div', { style: { minWidth: 0 }},
                  h('div', { style: { fontSize: '14px', fontWeight: 600, color: '#eaf2fb', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}, nd.label),
                  h('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '11px', color: '#566679', marginTop: '3px' }}, nd.conn),
                ),
                h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: '6px', flex: 'none', fontSize: '10.5px', fontFamily: "'IBM Plex Mono',monospace", color: nd.statusColor }},
                  h('span', { style: { width: '7px', height: '7px', borderRadius: '50%', background: nd.statusColor, display: 'inline-block' }}),
                  nd.status,
                ),
              ),
              h('div', { style: { display: 'flex', flexWrap: 'wrap', gap: '6px', marginTop: '13px' }}, chips),
              h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginTop: '14px', paddingTop: '12px', borderTop: '1px solid #131e2c' }},
                h('span', { style: { fontSize: '11px', color: '#566679' }}, 'memoria'),
                h('span', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '12.5px', color: '#aebccd' }}, nd.mem),
              ),
            );
          }),
        ),
  );
}

/* ---------- Rete view ---------- */
function ReteView({ m, coordinatorUrl, command }){
  return h('main', { style: { flex: 1, minHeight: 0, overflow: 'auto', padding: '20px 24px 40px' }},
    h(AssemblyStrip, { m }),
    !m.operational ? h(MissingAlert, { m, command }) : null,
    h('section', { className: 'syn-card', style: {
      background: '#0c1421', border: '1px solid #1b2a3f', borderRadius: '16px', padding: '18px 20px', marginBottom: '16px',
    }},
      h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', gap: '20px', flexWrap: 'wrap' }},
        h('div', null,
          h('div', { style: { fontSize: '14px', fontWeight: 600, color: '#eaf2fb', letterSpacing: '-.2px' }}, 'La rete'),
          h('div', { style: { fontSize: '12px', color: '#647689', marginTop: '4px', fontFamily: "'IBM Plex Mono',monospace" }}, m.totalNodes + ' nodi · coordinator ' + coordinatorUrl),
        ),
        h('div', { style: { display: 'flex', gap: '18px', alignItems: 'center', fontFamily: "'IBM Plex Mono',monospace" }},
          h('div', { style: { textAlign: 'right' }},
            h('div', { style: { fontSize: '18px', fontWeight: 600, color: m.statusColor, lineHeight: 1 }}, m.coveragePct + '%'),
            h('div', { style: { fontSize: '9.5px', color: '#566679', marginTop: '3px', letterSpacing: '.4px', whiteSpace: 'nowrap' }}, 'COVERAGE'),
          ),
          h('div', { style: { textAlign: 'right' }},
            h('div', { style: { fontSize: '18px', fontWeight: 600, color: '#cdd7e5', lineHeight: 1, whiteSpace: 'nowrap' }}, m.totalMem),

}

/* ---------- Chat view ---------- */
function ChatView({ m, coordinatorUrl, command, messages, setMessages, useMcp, setUseMcp, mcp }){
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const msgRef = useRef(null);
  const inputRef = useRef(null);

  useEffect(() => {
    if (msgRef.current) msgRef.current.scrollTop = msgRef.current.scrollHeight;
  }, [messages, loading]);

  const cli = 'axyn infer --coordinator ' + coordinatorUrl + ' --prompt "..."';
  const curl = "curl -X POST " + coordinatorUrl + "/v1/chat/completions -H 'content-type: application/json' -d '{\"messages\":[{\"role\":\"user\",\"content\":\"Ciao\"}]}'";
  const openai = "from openai import OpenAI\nclient = OpenAI(base_url=\"" + coordinatorUrl + "/v1\", api_key=\"axyn\")\nclient.chat.completions.create(model=\"" + m.model + "\", messages=[{\"role\":\"user\",\"content\":\"Ciao\"}])";

  const send = useCallback(async (override) => {
    const text = (override != null ? override : input).trim();
    if (!text || loading) return;
    if (!m.operational) return;
    const userMsg = { role: 'user', content: text };
    const history = messages.concat([userMsg]);
    setMessages(history);
    setInput('');
    setLoading(true);
    try {
      const body = { messages: history.map(mm => ({ role: mm.role, content: mm.content })), max_tokens: 256, temperature: 0.7 };
      if (useMcp) body.use_mcp = true;
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify(body),
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok){
        const err = (data && data.error) || ('errore ' + res.status);
        setMessages(h2 => h2.concat([{ role: 'system', content: err }]));
      } else {
        const choice = data && data.choices && data.choices[0];
        const content = (choice && choice.message && choice.message.content) || '';
        // failovers may live at top level or inside the choice — guard for absence
        let fail = undefined;
        if (typeof data.failovers === 'number') fail = data.failovers;
        else if (choice && typeof choice.failovers === 'number') fail = choice.failovers;
        const toolRuns = Array.isArray(data.tool_runs) ? data.tool_runs : [];
        setMessages(h2 => h2.concat([{ role: 'assistant', content, failovers: fail, toolRuns }]));
      }
    } catch (e) {
      setMessages(h2 => h2.concat([{ role: 'system', content: 'coordinator non raggiungibile: ' + (e && e.message || e) }]));
    } finally {
      setLoading(false);
    }
  }, [input, loading, m.operational, messages, setMessages, useMcp]);

  const onKey = e => {
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
  };

  const suggestions = [
    "Spiega in una frase cos'è la sharded inference.",
    "Scrivi una funzione Python che inverte una stringa.",
    "Riassumi i vantaggi di una rete decentralizzata.",

    return h('main', { style: {

        h('div', { className: 'syn-card', style: {

          borderRadius: '18px', padding: '30px 32px', textAlign: 'center',
        }},

            display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '30px',
            margin: '0 auto 18px', boxShadow: '0 0 34px rgba(245,158,11,.3)',

          h('div', { style: { fontSize: '13.5px', color: '#8b9bb0', marginTop: '8px', lineHeight: 1.5 }},

      h('div', { style: { width: 'min(880px,92%)', margin: '0 auto', display: 'flex', gap: '8px', alignItems: 'center', flexWrap: 'wrap' }},
        h('span', { style: { fontSize: '10px', fontFamily: "'IBM Plex Mono',monospace", color: '#566679', letterSpacing: '.5px' }}, 'CONNETTI UN CLIENT'),
        h(CopyChip, { prefix: 'CLI', text: cli }),

              h('div', { style: { width: '60px', height: '60px', borderRadius: '50%', border: '2px solid #2dd4bf', display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#2dd4bf', fontSize: '26px', boxShadow: '0 0 30px rgba(45,212,191,.25)', marginBottom: '16px' }}, '⌘'),

/* ---------- Gestione rete view ---------- */
function GestioneView({ coordinatorUrl, setCoordinatorUrl, nodeStatus, refreshNodeStatus }){
  const DEFAULT_MODEL = 'Qwen/Qwen2.5-0.5B-Instruct';

  // 0) network mode toggle: 'coordinator' | 'p2p'
  const [netMode, setNetMode] = useState('coordinator');

  // 1) coordinator target
  const [target, setTarget] = useState(coordinatorUrl || '');
  const [applyBusy, setApplyBusy] = useState(false);
  const [applyFb, setApplyFb] = useState(null);
  // keep the field in sync if the active target changes elsewhere
  useEffect(() => { setTarget(coordinatorUrl || ''); }, [coordinatorUrl]);

  // 2) create network
  const [crModel, setCrModel] = useState(DEFAULT_MODEL);
  const [crPort, setCrPort] = useState('9000');
  const [crBusy, setCrBusy] = useState(false);
  const [crFb, setCrFb] = useState(null);

  // 3) join network
  const [jnUrl, setJnUrl] = useState(coordinatorUrl || '');
  const [jnStages, setJnStages] = useState('embed,decoder:0-12');
  const [jnModel, setJnModel] = useState(DEFAULT_MODEL);
  const [jnBusy, setJnBusy] = useState(false);
  const [jnFb, setJnFb] = useState(null);
  useEffect(() => { setJnUrl(coordinatorUrl || ''); }, [coordinatorUrl]);

  // 4) local node stop busy map
  const [stopBusy, setStopBusy] = useState({});

  // 5) create P2P network (first/seed node, no coordinator)
  const [cpAdvertise, setCpAdvertise] = useState('http://127.0.0.1:8001');
  const [cpStages, setCpStages] = useState('embed,decoder:0-12');
  const [cpModel, setCpModel] = useState(DEFAULT_MODEL);
  const [cpBusy, setCpBusy] = useState(false);
  const [cpFb, setCpFb] = useState(null);

  // 6) join P2P network (via gossip peers)
  const [jpAdvertise, setJpAdvertise] = useState('http://127.0.0.1:8002');
  const [jpPeers, setJpPeers] = useState('http://127.0.0.1:8001');
  const [jpStages, setJpStages] = useState('decoder:12-24,head');
  const [jpModel, setJpModel] = useState(DEFAULT_MODEL);
  const [jpBusy, setJpBusy] = useState(false);
  const [jpFb, setJpFb] = useState(null);

  const postJson = async (url, body) => {
    const res = await fetch(url, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    return { res, data };
  };
  const errText = (data, res, fallback) =>
    (data && (data.error || data.detail)) || (fallback + ' (errore ' + res.status + ')');

  const applyTarget = async () => {
    const url = target.trim();
    if (!url){ setApplyFb({ kind: 'err', text: 'inserisci un URL coordinator' }); return; }
    setApplyBusy(true); setApplyFb(null);
    try {
      const { res, data } = await postJson('/api/config', { coordinator_url: url });
      if (!res.ok){ setApplyFb({ kind: 'err', text: errText(data, res, 'impossibile aggiornare il target') }); }
      else {
        const next = (data && data.coordinator_url) || url;
        setCoordinatorUrl(next);
        setApplyFb({ kind: 'ok', text: 'target aggiornato: ' + next + ' — il monitoraggio della rete ora punta qui.' });
      }
    } catch (e) {
      setApplyFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setApplyBusy(false); }
  };

  const createNetwork = async () => {
    const model = crModel.trim() || DEFAULT_MODEL;
    const portNum = parseInt(crPort, 10);
    if (isNaN(portNum) || portNum <= 0){ setCrFb({ kind: 'err', text: 'porta non valida' }); return; }
    setCrBusy(true); setCrFb(null);
    try {
      const { res, data } = await postJson('/api/network/create', { model, port: portNum });
      if (!res.ok){ setCrFb({ kind: 'err', text: errText(data, res, 'impossibile creare la rete') }); }
      else {
        const next = (data && data.coordinator_url) || '';
        if (next) setCoordinatorUrl(next);
        setCrFb({ kind: 'ok', text: 'rete creata · coordinator locale ' + next + '\nil target è stato spostato qui. La rete è vuota: usa "Aggiungiti a una rete" per avviare i nodi (il pannello "MANCANO" nella vista Rete mostra i pezzi necessari).' });
        refreshNodeStatus();
      }
    } catch (e) {
      setCrFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setCrBusy(false); }
  };

  const joinNetwork = async () => {
    const url = jnUrl.trim();
    const stages = jnStages.trim();
    const model = jnModel.trim() || DEFAULT_MODEL;
    if (!url){ setJnFb({ kind: 'err', text: 'inserisci un URL coordinator' }); return; }
    if (!stages){ setJnFb({ kind: 'err', text: 'specifica almeno uno stage (es. embed,decoder:0-12)' }); return; }
    setJnBusy(true); setJnFb(null);
    try {
      const { res, data } = await postJson('/api/network/join', { coordinator_url: url, stages, model });
      if (!res.ok){ setJnFb({ kind: 'err', text: errText(data, res, 'impossibile unirsi alla rete') }); }
      else {
        setJnFb({ kind: 'ok', text: 'nodo avviato · stages ' + stages + ' → ' + url });
        refreshNodeStatus();
      }
    } catch (e) {
      setJnFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setJnBusy(false); }
  };

  const createP2P = async () => {
    const advertise = cpAdvertise.trim();
    const stages = cpStages.trim();
    const model = cpModel.trim() || DEFAULT_MODEL;
    if (!advertise){ setCpFb({ kind: 'err', text: 'inserisci un Advertise URL' }); return; }
    if (!stages){ setCpFb({ kind: 'err', text: 'specifica almeno uno stage (es. embed,decoder:0-12)' }); return; }
    setCpBusy(true); setCpFb(null);
    try {
      const { res, data } = await postJson('/api/network/create_p2p', { advertise, stages, model });
      if (!res.ok){ setCpFb({ kind: 'err', text: errText(data, res, 'impossibile creare la rete P2P') }); }
      else {
        const next = (data && data.coordinator_url) || advertise;
        if (next) setCoordinatorUrl(next);
        setCpFb({ kind: 'ok', text: 'nodo seed P2P avviato · ' + advertise + '\nla dashboard ora punta al tuo nodo (' + next + '). Nessun coordinator: aggiungi altri nodi via gossip per completare il modello.' });
        refreshNodeStatus();
      }
    } catch (e) {
      setCpFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setCpBusy(false); }
  };

  const joinP2P = async () => {
    const advertise = jpAdvertise.trim();
    const peers = jpPeers.trim();
    const stages = jpStages.trim();
    const model = jpModel.trim() || DEFAULT_MODEL;
    if (!advertise){ setJpFb({ kind: 'err', text: 'inserisci un Advertise URL' }); return; }
    if (!peers){ setJpFb({ kind: 'err', text: 'specifica almeno un peer (es. http://127.0.0.1:8001)' }); return; }
    if (!stages){ setJpFb({ kind: 'err', text: 'specifica almeno uno stage (es. decoder:12-24,head)' }); return; }
    setJpBusy(true); setJpFb(null);
    try {
      const { res, data } = await postJson('/api/network/join_p2p', { advertise, peers, stages, model });
      if (!res.ok){ setJpFb({ kind: 'err', text: errText(data, res, 'impossibile unirsi alla rete P2P') }); }
      else {
        const next = (data && data.coordinator_url) || advertise;
        if (next) setCoordinatorUrl(next);
        setJpFb({ kind: 'ok', text: 'nodo P2P avviato · stages ' + stages + ' · peers ' + peers + '\nla dashboard ora punta al tuo nodo (' + next + ').' });
        refreshNodeStatus();
      }
    } catch (e) {
      setJpFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setJpBusy(false); }
  };

  const stopRole = async (role) => {
    setStopBusy(b => Object.assign({}, b, { [role]: true }));
    try {
      const body = role ? { role } : {};
      const { res, data } = await postJson('/api/node/stop', body);
      if (!res.ok){ window.alert(errText(data, res, 'impossibile fermare il processo')); }
      refreshNodeStatus();
    } catch (e) {
      window.alert('richiesta fallita: ' + (e && e.message || e));
    } finally {
      setStopBusy(b => Object.assign({}, b, { [role]: false }));
    }
  };

  // build local-node rows
  const ns = nodeStatus || {};
  const roleRows = [];
  ['coordinator', 'worker'].forEach(role => {
    const info = ns[role];
    if (!info) return;
    const running = !!info.running;
    const lines = [];
    if (typeof info.pid !== 'undefined' && info.pid !== null) lines.push(['pid', String(info.pid)]);
    if (role === 'coordinator'){
      if (info.port != null) lines.push(['port', String(info.port)]);
      if (info.url) lines.push(['url', info.url]);
      if (info.model) lines.push(['model', info.model]);
    } else {
      if (info.stages) lines.push(['stages', String(info.stages)]);
      if (info.coordinator) lines.push(['coordinator', info.coordinator]);
      if (info.model) lines.push(['model', info.model]);
    }
    roleRows.push({ role, running, lines });
  });

  const fieldStyle = { flex: 1, minWidth: '200px' };

  return h('main', { style: { flex: 1, minHeight: 0, overflow: 'auto', padding: '20px 24px 40px' }},
    h('div', { style: { maxWidth: '920px', margin: '0 auto' }},

      // 1 - coordinator target
      h(GCard, { title: 'Coordinator bersaglio', subtitle: 'Il coordinator verso cui la UI inoltra registry, chat e inferenza. Cambialo per monitorare un\'altra rete.' },
        h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-end', flexWrap: 'wrap' }},
          h('div', { style: fieldStyle },
            GLabel('coordinator url'),
            h('input', { type: 'text', value: target, spellCheck: false,
              onChange: e => setTarget(e.target.value),
              onKeyDown: e => { if (e.key === 'Enter') applyTarget(); },
              placeholder: 'http://localhost:9000', style: gInputStyle }),
          ),
          h(GButton, { onClick: applyTarget, busy: applyBusy }, 'Applica'),
        ),
        h(Feedback, { fb: applyFb }),
      ),

      // mode toggle: Coordinator | P2P (senza coordinator)
      h(GCard, { title: 'Modalità rete', subtitle: 'Scegli come avviare/unire i nodi: con un coordinator centrale, oppure in P2P dove i nodi si scoprono via gossip senza coordinator.' },
        h('div', { style: { display: 'flex', background: '#0b1320', border: '1px solid #1c2a3e', borderRadius: '11px', padding: '3px', gap: '3px', maxWidth: '420px' }},
          [['coordinator', 'Coordinator'], ['p2p', 'P2P (senza coordinator)']].map(([mode, lbl]) => {
            const active = netMode === mode;
            return h('button', { key: mode, onClick: () => setNetMode(mode), style: Object.assign({
              flex: 1, cursor: 'pointer', border: 'none', borderRadius: '8px', padding: '8px 14px',
              fontFamily: "'IBM Plex Sans',sans-serif", fontSize: '13px', fontWeight: 600,
              letterSpacing: '.2px', transition: 'all .25s ease', whiteSpace: 'nowrap',
            }, active
              ? { background: '#16313a', color: '#7ff0e0', boxShadow: 'inset 0 -2px 0 ' + TEAL }
              : { background: 'transparent', color: '#67788f' }) }, lbl);
          }),
        ),
      ),

      // ===== COORDINATOR MODE =====
      netMode === 'coordinator' ? h('div', null,

      // 2 - create network
      h(GCard, { title: 'Crea una rete', subtitle: 'Avvia un coordinator locale e imposta automaticamente il target su di esso.' },
        h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-end', flexWrap: 'wrap' }},
          h('div', { style: { flex: 2, minWidth: '220px' }},
            GLabel('model id'),
            h('input', { type: 'text', value: crModel, spellCheck: false,
              onChange: e => setCrModel(e.target.value), placeholder: DEFAULT_MODEL, style: gInputStyle }),
          ),
          h('div', { style: { flex: '0 0 120px', minWidth: '100px' }},
            GLabel('port'),
            h('input', { type: 'text', value: crPort, spellCheck: false,
              onChange: e => setCrPort(e.target.value), placeholder: '9000', style: gInputStyle }),
          ),
          h(GButton, { onClick: createNetwork, busy: crBusy }, 'Crea rete'),
        ),
        h(Feedback, { fb: crFb }),
      ),

      // 3 - join network
      h(GCard, { title: 'Aggiungiti a una rete', subtitle: 'Avvia un nodo serve locale che si unisce al coordinator indicato servendo gli stage scelti.' },
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: '13px' }},
          h('div', null,
            GLabel('coordinator url'),
            h('input', { type: 'text', value: jnUrl, spellCheck: false,
              onChange: e => setJnUrl(e.target.value), placeholder: 'http://localhost:9000', style: gInputStyle }),
          ),
          h('div', null,
            GLabel('stages (es. embed,decoder:0-12 · head)'),
            h('input', { type: 'text', value: jnStages, spellCheck: false,
              onChange: e => setJnStages(e.target.value), placeholder: 'embed,decoder:0-12', style: gInputStyle }),
          ),
          h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-end', flexWrap: 'wrap' }},
            h('div', { style: { flex: 1, minWidth: '220px' }},
              GLabel('model id'),
              h('input', { type: 'text', value: jnModel, spellCheck: false,
                onChange: e => setJnModel(e.target.value), placeholder: DEFAULT_MODEL, style: gInputStyle }),
            ),
            h(GButton, { onClick: joinNetwork, busy: jnBusy }, 'Aggiungiti'),
          ),
        ),
        h(Feedback, { fb: jnFb }),
      )

      ) : null,
      // ===== END COORDINATOR MODE =====

      // ===== P2P MODE =====
      netMode === 'p2p' ? h('div', null,

      // P2P - create network (first/seed node)
      h(GCard, { title: 'Crea rete P2P (primo nodo)', subtitle: 'Avvia un nodo seed P2P (serve --advertise --stages, senza coordinator) e punta la dashboard al tuo nodo.' },
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: '13px' }},
          h('div', null,
            GLabel('advertise url'),
            h('input', { type: 'text', value: cpAdvertise, spellCheck: false,
              onChange: e => setCpAdvertise(e.target.value), placeholder: 'http://127.0.0.1:8001', style: gInputStyle }),
            h('div', { style: { fontSize: '11px', color: '#647689', marginTop: '6px', lineHeight: 1.5 }}, "l'URL con cui ti annunci, raggiungibile dagli altri nodi"),
          ),
          h('div', null,
            GLabel('stages (es. embed,decoder:0-12 · head)'),
            h('input', { type: 'text', value: cpStages, spellCheck: false,
              onChange: e => setCpStages(e.target.value), placeholder: 'embed,decoder:0-12', style: gInputStyle }),
          ),
          h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-end', flexWrap: 'wrap' }},
            h('div', { style: { flex: 1, minWidth: '220px' }},
              GLabel('model id'),
              h('input', { type: 'text', value: cpModel, spellCheck: false,
                onChange: e => setCpModel(e.target.value), placeholder: DEFAULT_MODEL, style: gInputStyle }),
            ),
            h(GButton, { onClick: createP2P, busy: cpBusy }, 'Crea rete P2P'),
          ),
        ),
        h(Feedback, { fb: cpFb }),
      ),

      // P2P - join network (via gossip peers)
      h(GCard, { title: 'Aggiungiti a rete P2P', subtitle: 'Avvia un nodo P2P locale che si unisce alla rete via gossip indicando uno o più peer seed.' },
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: '13px' }},
          h('div', null,
            GLabel('advertise url (il tuo nodo)'),
            h('input', { type: 'text', value: jpAdvertise, spellCheck: false,
              onChange: e => setJpAdvertise(e.target.value), placeholder: 'http://127.0.0.1:8002', style: gInputStyle }),
          ),
          h('div', null,
            GLabel('peers (url di un nodo seed)'),
            h('input', { type: 'text', value: jpPeers, spellCheck: false,
              onChange: e => setJpPeers(e.target.value), placeholder: 'http://127.0.0.1:8001', style: gInputStyle }),
          ),
          h('div', null,
            GLabel('stages (es. decoder:12-24,head)'),
            h('input', { type: 'text', value: jpStages, spellCheck: false,
              onChange: e => setJpStages(e.target.value), placeholder: 'decoder:12-24,head', style: gInputStyle }),
          ),
          h('div', { style: { display: 'flex', gap: '10px', alignItems: 'flex-end', flexWrap: 'wrap' }},
            h('div', { style: { flex: 1, minWidth: '220px' }},
              GLabel('model id'),
              h('input', { type: 'text', value: jpModel, spellCheck: false,
                onChange: e => setJpModel(e.target.value), placeholder: DEFAULT_MODEL, style: gInputStyle }),
            ),
            h(GButton, { onClick: joinP2P, busy: jpBusy }, 'Aggiungiti (P2P)'),
          ),
        ),
        h(Feedback, { fb: jpFb }),
      ),

      // P2P explainer note
      h('div', { style: {
        fontSize: '11.5px', color: '#647689', lineHeight: 1.6, marginBottom: '16px',
        padding: '12px 14px', background: '#0c1421', border: '1px solid #1b2a3f', borderRadius: '12px',
      }}, 'Nessun coordinator: i nodi si scoprono via gossip e ognuno è interrogabile (la chat funziona puntando la dashboard a un peer). Richiede che i nodi si raggiungano (LAN/VPN/IP pubblici).')

      ) : null,
      // ===== END P2P MODE =====

      // 4 - local node status
      h(GCard, { title: 'Nodo locale', subtitle: 'Processi avviati da questa UI · aggiornato ogni 2s.' },
        roleRows.length === 0
          ? h('div', { style: { padding: '22px', textAlign: 'center', border: '1px dashed #233246', borderRadius: '12px', color: '#647689', fontSize: '13px' }}, 'nessun processo gestito da questa UI')
          : h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(260px,1fr))', gap: '13px' }},
              roleRows.map(r => h('div', { key: r.role, className: 'syn-card', style: {
                background: '#0a121d', border: '1px solid #182539', borderRadius: '13px', padding: '15px 16px',
                borderLeft: '3px solid ' + (r.running ? TEAL : RED),
              }},
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '10px' }},
                  h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' }},
                    h(StatusDot, { on: r.running }),
                    h('span', { style: { fontSize: '14px', fontWeight: 600, color: '#eaf2fb' }}, r.role),
                  ),
                  h('span', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '10.5px', color: r.running ? TEAL : RED }}, r.running ? 'in esecuzione' : 'fermo'),
                ),
                h('div', { style: { marginTop: '13px', display: 'flex', flexDirection: 'column', gap: '6px' }},
                  r.lines.length
                    ? r.lines.map(([k, v], i) => h('div', { key: i, style: { display: 'flex', justifyContent: 'space-between', gap: '12px', fontFamily: "'IBM Plex Mono',monospace", fontSize: '11.5px' }},
                        h('span', { style: { color: '#566679' }}, k),
                        h('span', { style: { color: '#aebccd', wordBreak: 'break-all', textAlign: 'right' }}, v),
                      ))
                    : h('div', { style: { fontSize: '11.5px', color: '#566679' }}, '—'),
                ),
                h('div', { style: { marginTop: '14px', paddingTop: '12px', borderTop: '1px solid #131e2c', display: 'flex', justifyContent: 'flex-end' }},
                  h(GButton, { onClick: () => stopRole(r.role), busy: !!stopBusy[r.role], disabled: !r.running, tone: 'danger' }, 'Stop'),
                ),
              )),
            ),
      ),
    ),
  );
}

/* ---------- toggle switch ---------- */
function ToggleSwitch({ on, onChange }){
  return h('button', { onClick: () => onChange(!on), style: {
    cursor: 'pointer', border: 'none', padding: 0, flex: 'none',
    width: '42px', height: '24px', borderRadius: '12px', position: 'relative',
    transition: 'background .25s ease',
    background: on ? TEAL : '#1f2e44',
  }},
    h('span', { style: {
      position: 'absolute', top: '3px', left: on ? '21px' : '3px',
      width: '18px', height: '18px', borderRadius: '50%',
      background: on ? '#04201c' : '#7f93ab', transition: 'left .25s ease',
    }}),
  );
}

/* ---------- MCP view ---------- */
function McpView({ mcp, refreshMcp, useMcp, setUseMcp }){
  const [name, setName] = useState('');
  const [command, setCommand] = useState('');
  const [args, setArgs] = useState('');
  const [addBusy, setAddBusy] = useState(false);
  const [addFb, setAddFb] = useState(null);
  const [rmBusy, setRmBusy] = useState({});

  const postJson = async (url, body) => {
    const res = await fetch(url, {
      method: 'POST', headers: { 'content-type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json().catch(() => ({}));
    return { res, data };
  };
  const errText = (data, res, fallback) =>
    (data && (data.error || data.detail)) || (fallback + ' (errore ' + res.status + ')');

  const addServer = async () => {
    const nm = name.trim();
    const cmd = command.trim();
    if (!nm){ setAddFb({ kind: 'err', text: 'inserisci un nome per il server' }); return; }
    if (!cmd){ setAddFb({ kind: 'err', text: 'inserisci un comando (es. npx)' }); return; }
    const argList = args.trim() ? args.trim().split(/\s+/) : [];
    setAddBusy(true); setAddFb(null);
    try {
      const { res, data } = await postJson('/api/mcp/add', { name: nm, command: cmd, args: argList });
      if (!res.ok || (data && data.ok === false)){
        setAddFb({ kind: 'err', text: errText(data, res, 'impossibile aggiungere il server') });
      } else {
        setAddFb({ kind: 'ok', text: 'server "' + nm + '" aggiunto · i tool verranno scoperti al collegamento' });
        setName(''); setCommand(''); setArgs('');
        refreshMcp();
      }
    } catch (e) {
      setAddFb({ kind: 'err', text: 'richiesta fallita: ' + (e && e.message || e) });
    } finally { setAddBusy(false); }
  };

  const removeServer = async (nm) => {
    setRmBusy(b => Object.assign({}, b, { [nm]: true }));
    try {
      const { res, data } = await postJson('/api/mcp/remove', { name: nm });
      if (!res.ok || (data && data.ok === false)){ window.alert(errText(data, res, 'impossibile rimuovere il server')); }
      refreshMcp();
    } catch (e) {
      window.alert('richiesta fallita: ' + (e && e.message || e));
    } finally {
      setRmBusy(b => Object.assign({}, b, { [nm]: false }));
    }
  };

  const servers = (mcp && mcp.servers) || [];
  const tools = (mcp && mcp.tools) || [];
  const fieldStyle = { flex: 1, minWidth: '200px' };

  return h('main', { style: { flex: 1, minHeight: 0, overflow: 'auto', padding: '20px 24px 40px' }},
    h('div', { style: { maxWidth: '920px', margin: '0 auto' }},

      // toggle - enable tools in chat
      h(GCard, { title: 'Tool MCP nella chat', subtitle: 'Quando attivo, la chat invia le richieste in modalità tool-calling: il modello può chiamare i tool MCP configurati qui sotto.' },
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap' }},
          h(ToggleSwitch, { on: useMcp, onChange: setUseMcp }),
          h('span', { style: { fontSize: '13px', color: useMcp ? '#7ff0e0' : '#8b9bb0', fontWeight: 600 }},
            useMcp ? 'Tool MCP attivi nella chat' : 'Tool MCP disattivati'),
          servers.length ? h('span', { style: {
            fontFamily: "'IBM Plex Mono',monospace", fontSize: '11px', color: '#566679',
          }}, servers.length + ' server · ' + tools.length + ' tool') : null,
        ),
        h('div', { style: { marginTop: '13px', fontSize: '11.5px', color: '#647689', lineHeight: 1.5 }},
          'I tool MCP sono eseguiti da questa UI; il modello decide quando chiamarli. Richiede un modello che supporti il tool-calling.'),
      ),

      // add server
      h(GCard, { title: 'Aggiungi server MCP', subtitle: 'Definisce un server MCP avviato via comando locale (stdio). Gli args sono separati da spazi.' },
        h('div', { style: { display: 'flex', flexDirection: 'column', gap: '13px' }},
          h('div', { style: { display: 'flex', gap: '10px', flexWrap: 'wrap' }},
            h('div', { style: fieldStyle },
              GLabel('name'),
              h('input', { type: 'text', value: name, spellCheck: false,
                onChange: e => setName(e.target.value), placeholder: 'filesystem', style: gInputStyle }),
            ),
            h('div', { style: fieldStyle },
              GLabel('command'),
              h('input', { type: 'text', value: command, spellCheck: false,
                onChange: e => setCommand(e.target.value), placeholder: 'npx', style: gInputStyle }),
            ),
          ),
          h('div', null,
            GLabel('args (separati da spazi)'),
            h('input', { type: 'text', value: args, spellCheck: false,
              onChange: e => setArgs(e.target.value),
              onKeyDown: e => { if (e.key === 'Enter') addServer(); },
              placeholder: '@modelcontextprotocol/server-filesystem /path', style: gInputStyle }),
          ),
          h('div', { style: { display: 'flex', justifyContent: 'flex-end' }},
            h(GButton, { onClick: addServer, busy: addBusy }, 'Aggiungi'),
          ),
        ),
        h(Feedback, { fb: addFb }),
      ),

      // configured servers + discovered tools
      h(GCard, { title: 'Server configurati', subtitle: 'Server MCP registrati in questa UI e tool scoperti.' },
        mcp && mcp.error
          ? h('div', { style: {
              fontSize: '12px', lineHeight: 1.5, padding: '11px 13px', borderRadius: '10px',
              fontFamily: "'IBM Plex Mono',monospace", whiteSpace: 'pre-wrap', wordBreak: 'break-word',
              background: 'rgba(245,158,11,.08)', border: '1px solid #3d300f', color: '#f3c46b',
            }}, '⚠ ' + mcp.error)
          : null,
        servers.length === 0
          ? h('div', { style: { marginTop: mcp && mcp.error ? '13px' : 0, padding: '22px', textAlign: 'center', border: '1px dashed #233246', borderRadius: '12px', color: '#647689', fontSize: '13px' }}, 'nessun server MCP configurato')
          : h('div', { style: { marginTop: mcp && mcp.error ? '13px' : 0, display: 'flex', flexDirection: 'column', gap: '11px' }},
              servers.map(nm => h('div', { key: nm, className: 'syn-card', style: {
                background: '#0a121d', border: '1px solid #182539', borderRadius: '13px',
                padding: '14px 16px', borderLeft: '3px solid ' + TEAL,
              }},
                h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '10px' }},
                  h('div', { style: { display: 'flex', alignItems: 'center', gap: '8px' }},
                    h(StatusDot, { on: true }),
                    h('span', { style: { fontSize: '14px', fontWeight: 600, color: '#eaf2fb', fontFamily: "'IBM Plex Mono',monospace" }}, nm),
                  ),
                  h(GButton, { onClick: () => removeServer(nm), busy: !!rmBusy[nm], tone: 'danger' }, 'Rimuovi'),
                ),
              )),
            ),

        // discovered tools
        h('div', { style: { marginTop: '18px' }},
          h('div', { style: { fontSize: '10.5px', letterSpacing: '.4px', color: '#7f93ab', fontFamily: "'IBM Plex Mono',monospace", marginBottom: '10px' }},
            'TOOL SCOPERTI' + (tools.length ? ' (' + tools.length + ')' : '')),
          tools.length === 0
            ? h('div', { style: { padding: '16px', textAlign: 'center', border: '1px dashed #233246', borderRadius: '12px', color: '#647689', fontSize: '12.5px' }}, 'nessun tool disponibile')
            : h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(auto-fill,minmax(248px,1fr))', gap: '11px' }},
                tools.map((t, i) => h('div', { key: t.name || i, style: {
                  background: '#0b1320', border: '1px solid #1c2a3e', borderRadius: '11px', padding: '12px 14px',
                }},
                  h('div', { style: { display: 'flex', alignItems: 'center', gap: '7px' }},
                    h('span', { style: { fontSize: '12px' }}, '🔧'),
                    h('span', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', color: '#7ff0e0', fontWeight: 600, wordBreak: 'break-all' }}, t.name || '—'),
                  ),
                  t.description ? h('div', { style: { fontSize: '11.5px', color: '#8b9bb0', marginTop: '7px', lineHeight: 1.5 }}, t.description) : null,
                )),
              ),
        ),
      ),
    ),
  );
}

/* ---------- Header ---------- */
function Header({ view, setView, coordinatorUrl, updatedAgo, operational, error, mcpCount }){
  const tab = active => Object.assign({
    cursor: 'pointer', border: 'none', borderRadius: '8px', padding: '7px 16px',
    fontFamily: "'IBM Plex Sans',sans-serif", fontSize: '13px', fontWeight: 600,
    letterSpacing: '.2px', display: 'flex', alignItems: 'center', gap: '6px', transition: 'all .25s ease',
    position: 'relative',
  }, active
    ? { background: '#16313a', color: '#7ff0e0', boxShadow: 'inset 0 -2px 0 ' + TEAL }
    : { background: 'transparent', color: '#67788f' });

  return h('header', { style: {
    flex: 'none', display: 'flex', justifyContent: 'space-between', alignItems: 'center',
    gap: '20px', flexWrap: 'wrap', padding: '14px 24px', borderBottom: '1px solid #142031',
    background: 'linear-gradient(180deg,#0a121d,#080d15)',
  }},
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '13px' }},
      h('svg', { width: 34, height: 34, viewBox: '0 0 40 40', fill: 'none', style: { flex: 'none' }},
        h('circle', { cx: 20, cy: 20, r: 5.2, fill: '#2dd4bf' }),
        h('circle', { cx: 6, cy: 11, r: 3, fill: '#38bdf8' }),
        h('circle', { cx: 6, cy: 29, r: 3, fill: '#a78bfa' }),
        h('circle', { cx: 34, cy: 11, r: 3, fill: '#f472b6' }),
        h('circle', { cx: 34, cy: 29, r: 3, fill: '#fb923c' }),
        h('g', { stroke: '#2dd4bf', strokeWidth: 1.3, opacity: 0.55 },
          h('line', { x1: 20, y1: 20, x2: 6, y2: 11 }),
          h('line', { x1: 20, y1: 20, x2: 6, y2: 29 }),
          h('line', { x1: 20, y1: 20, x2: 34, y2: 11 }),
          h('line', { x1: 20, y1: 20, x2: 34, y2: 29 }),
        ),
      ),
      h('div', null,
        h('div', { style: { fontSize: '18px', fontWeight: 700, letterSpacing: '-.3px', color: '#f1f6fc', lineHeight: 1 }}, 'Axyn'),
        h('div', { style: { fontSize: '11px', color: '#67788f', marginTop: '4px', letterSpacing: '.2px' }}, 'rete di inferenza LLM decentralizzata'),
      ),
    ),
    h('div', { style: { display: 'flex', background: '#0b1320', border: '1px solid #1c2a3e', borderRadius: '11px', padding: '3px', gap: '3px' }},
      h('button', { onClick: () => setView('rete'), style: tab(view === 'rete') }, 'Rete'),
      h('button', { onClick: () => setView('chat'), style: tab(view === 'chat') },
        !operational ? h('span', { style: { fontSize: '11px' }}, '🔒') : null,
        'Chat',
      ),
      h('button', { onClick: () => setView('gestione'), style: tab(view === 'gestione') }, 'Gestione'),
      h('button', { onClick: () => setView('mcp'), style: tab(view === 'mcp') },
        'MCP',
        mcpCount ? h('span', { style: {
          fontFamily: "'IBM Plex Mono',monospace", fontSize: '9.5px', color: '#04201c',
          background: TEAL, borderRadius: '6px', padding: '1px 5px', fontWeight: 700,
        }}, mcpCount) : null,
      ),
    ),
    h('div', { style: { display: 'flex', alignItems: 'center', gap: '14px', flexWrap: 'wrap', justifyContent: 'flex-end' }},
      h('div', { style: { display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: '4px' }},
        h('div', { style: { fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', color: '#dbe6f3', background: '#0b1320', border: '1px solid #1f2e44', borderRadius: '8px', padding: '6px 10px' }}, coordinatorUrl),
        h('div', { style: { display: 'flex', alignItems: 'center', gap: '7px', fontSize: '10.5px', color: '#566679', fontFamily: "'IBM Plex Mono',monospace", whiteSpace: 'nowrap' }},
          h('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: error ? AMBER : '#2dd4bf', animation: 'synpulse 2s infinite', display: 'inline-block' }}),
          updatedAgo,
        ),
      ),
      h(StatusBadge, { operational }),
    ),
  );
}

/* ---------- App ---------- */
function App(){
  const [coordinatorUrl, setCoordinatorUrl] = useState('');
  const [registry, setRegistry] = useState(null);
  const [error, setError] = useState(null);
  const [view, setView] = useState('rete');
  const [lastUpdate, setLastUpdate] = useState(Date.now());
  const [now, setNow] = useState(Date.now());
  const [messages, setMessages] = useState([]);
  const [nodeStatus, setNodeStatus] = useState(null);
  const [useMcp, setUseMcp] = useState(false);
  const [mcp, setMcp] = useState({ servers: [], tools: [], error: null });

  // fetch local node status (used by the Gestione panel)
  const refreshNodeStatus = useCallback(async () => {
    try {
      const res = await fetch('/api/node/status', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (res.ok) setNodeStatus(data || {});
    } catch (e) { /* keep last known status */ }
  }, []);

  // fetch MCP servers + discovered tools (used by the MCP panel + chat badge)
  const refreshMcp = useCallback(async () => {
    try {
      const res = await fetch('/api/mcp/list', { cache: 'no-store' });
      const data = await res.json().catch(() => ({}));
      if (res.ok) setMcp({
        servers: Array.isArray(data.servers) ? data.servers : [],
        tools: Array.isArray(data.tools) ? data.tools : [],
        error: data.error || null,
      });
      else setMcp(prev => Object.assign({}, prev, { error: (data && data.error) || ('errore ' + res.status) }));
    } catch (e) { setMcp(prev => Object.assign({}, prev, { error: 'richiesta fallita: ' + (e && e.message || e) })); }
  }, []);

  // poll node status every 2s
  useEffect(() => {
    refreshNodeStatus();
    const id = setInterval(refreshNodeStatus, 2000);
    return () => clearInterval(id);
  }, [refreshNodeStatus]);

  // load config once
  useEffect(() => {
    let cancelled = false;
    fetch('/api/config')
      .then(r => r.json())
      .then(d => { if (!cancelled) setCoordinatorUrl((d && d.coordinator_url) || ''); })
      .catch(() => {});
    return () => { cancelled = true; };
  }, []);

  // poll registry every 2s
  useEffect(() => {
    let cancelled = false;
    const poll = async () => {
      try {
        const res = await fetch('/api/registry', { cache: 'no-store' });
        const data = await res.json().catch(() => ({}));
        if (cancelled) return;
        if (!res.ok || (data && data.error)){
          setError((data && data.error) || 'coordinator non raggiungibile');
        } else {
          setRegistry(data);
          setError(null);
        }
        setLastUpdate(Date.now());
      } catch (e) {
        if (cancelled) return;
        setError('coordinator non raggiungibile');
        setLastUpdate(Date.now());
      }
    };
    poll();
    const id = setInterval(poll, 2000);
    return () => { cancelled = true; clearInterval(id); };
  }, []);

  // 1s tick for "aggiornato Xs fa"
  useEffect(() => {
    const id = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(id);
  }, []);

  // refresh MCP servers/tools on entering the MCP view; also load once for the chat badge
  useEffect(() => { refreshMcp(); }, [refreshMcp]);
  useEffect(() => { if (view === 'mcp') refreshMcp(); }, [view, refreshMcp]);

  const m = buildChain(registry || {});
  const command = serveCommand(coordinatorUrl, m);
  const updatedAgo = 'aggiornato ' + Math.max(0, Math.round((now - lastUpdate) / 1000)) + 's fa';

  return h('div', { style: {
    height: '100vh', display: 'flex', flexDirection: 'column', background: '#070a10',
    color: '#cdd7e5', fontFamily: "'IBM Plex Sans',system-ui,sans-serif",
  }},
    h(Header, { view, setView, coordinatorUrl, updatedAgo, operational: m.operational, error, mcpCount: mcp.servers.length }),
    error ? h('div', { style: {
      flex: 'none', background: '#2a1410', borderBottom: '1px solid #5a241c', color: '#fca5a5',
      fontFamily: "'IBM Plex Mono',monospace", fontSize: '12px', padding: '9px 24px',
      display: 'flex', alignItems: 'center', gap: '8px',
    }},
      h('span', { style: { width: '7px', height: '7px', borderRadius: '50%', background: AMBER, display: 'inline-block' }}),
      'coordinator non raggiungibile',
    ) : null,
    view === 'rete'
      ? h(ReteView, { m, coordinatorUrl, command })
      : view === 'gestione'
      ? h(GestioneView, { coordinatorUrl, setCoordinatorUrl, nodeStatus, refreshNodeStatus })
      : view === 'mcp'
      ? h(McpView, { mcp, refreshMcp, useMcp, setUseMcp })
      : h(ChatView, { m, coordinatorUrl, command, messages, setMessages, useMcp, setUseMcp, mcp }),
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
